name: Build macOS Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-macos.yml"
      - "build/**"
      - "config/**"
      - "desktop/**"
      - "pack-fixes/**"
      - "public/**"
      - "server-lock-mod/build/libs/aht-version-lock-*.jar"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "README.md"

jobs:
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMGs
        run: npm run dist:regular:macos

      - name: Upload macOS DMGs
        uses: actions/upload-artifact@v4
        with:
          name: aht-launcher-macos-dmg
          path: release-builds/macos/*.dmg
          if-no-files-found: error