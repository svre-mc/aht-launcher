<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A Hard Time Launcher</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <h1>A Hard Time Dregora</h1>
        <div id="versionLine" class="muted">Loading</div>
      </div>
      <div id="badge" class="badge">Checking</div>
    </section>

    <section class="actions">
      <button id="updateButton" type="button">Update</button>
      <button id="repairButton" type="button">Repair</button>
      <button id="playButton" type="button">Play</button>
    </section>

    <section class="status">
      <div class="row">
        <span>Instance</span>
        <strong id="instanceDir">-</strong>
      </div>
      <div class="row">
        <span>Installed</span>
        <strong id="installedVersion">-</strong>
      </div>
      <div class="row">
        <span>Latest</span>
        <strong id="latestVersion">-</strong>
      </div>
    </section>

    <pre id="log" class="log"></pre>
  </main>
  <script src="/launcher.js"></script>
</body>
</html>
